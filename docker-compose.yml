version: "3.9"

services:
  rag-ingest:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: rag-project:latest
    container_name: rag-ingest
    env_file:
      - .env
    environment:
      EMBEDDING_DEVICE: cpu
      VECTORSTORE_DIR: /app/data/vectorstore
      DOCUMENTS_DIR: /app/data/documents
    volumes:
      - rag-vectorstore:/app/data/vectorstore
      - rag-documents:/app/data/documents
      - rag-cache:/app/.cache_embeddings
    command: ["rag-ingest"]

  rag-query:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: rag-project:latest
    container_name: rag-query
    stdin_open: true
    tty: true
    env_file:
      - .env
    environment:
      EMBEDDING_DEVICE: cpu
      VECTORSTORE_DIR: /app/data/vectorstore
      DOCUMENTS_DIR: /app/data/documents
    volumes:
      - rag-vectorstore:/app/data/vectorstore
      - rag-documents:/app/data/documents
      - rag-cache:/app/.cache_embeddings
    command: ["rag-query"]

volumes:
  rag-vectorstore:
  rag-documents:
  rag-cache:
